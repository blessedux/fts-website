<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>Fanny Torres da Silva</title>
</head>
<body style="margin:0;padding:0;background-color:#251105;font-family:Georgia,'Times New Roman',serif;">
  <span style="display:none!important;visibility:hidden;opacity:0;color:transparent;height:0;width:0;max-height:0;max-width:0;overflow:hidden;">{{{PREHEADER}}}</span>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="min-height:100%;background-color:#251105;background-image:linear-gradient(165deg,#251105 0%,#3d2316 42%,#251105 100%);">
    <tr>
      <td align="center" style="padding:28px 16px 44px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;">
          <tr>
            <td style="background-color:#f2ebe3;border:1px solid #967e66;border-radius:18px;padding:40px 32px 36px;min-height:280px;box-sizing:border-box;box-shadow:0 8px 32px rgba(37,17,5,0.35);">
              <p style="margin:0 0 10px;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#967e66;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">Fanny Torres da Silva</p>
              <h1 style="margin:0 0 22px;font-size:26px;line-height:1.28;color:#251105;font-weight:600;font-family:Georgia,'Times New Roman',serif;">{{{HEADLINE}}}</h1>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.65;color:#3d2316;">{{{BODY_LINE_1}}}</p>
              <p style="margin:0 0 24px;font-size:16px;line-height:1.65;color:#6a4128;">{{{BODY_LINE_2}}}</p>
              <p style="margin:0 0 28px;padding:18px 20px;background-color:#e8dfd4;border:1px solid #c4b5a6;border-radius:12px;font-size:17px;line-height:1.45;color:#251105;font-weight:600;">{{{DATE_TIME_LINE}}}</p>
              {{{ACTION_BLOCK}}}
              {{{CALENDAR_BLOCK}}}
              {{{FOOTER_NOTE}}}
              <p style="margin:30px 0 0;font-size:14px;line-height:1.6;color:#6a4128;">Un saludo,<br /><strong style="color:#251105;">Fanny Torres da Silva</strong></p>
              <p style="margin:22px 0 0;font-size:13px;line-height:1.5;">
                <a href="{{{SITE_URL}}}" style="color:#967e66;text-decoration:underline;">{{{SITE_URL}}}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding-top:20px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#3d2316;border:1px solid #967e66;border-radius:16px;padding:26px 20px 24px;box-sizing:border-box;">
                <tr>
                  <td align="center" style="padding:0 0 14px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#c4b5a6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">Síguenos</td>
                </tr>
                <tr>
                  <td align="center">
                    {{{SOCIAL_FOOTER_BLOCK}}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
